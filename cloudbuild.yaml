steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/qybsl-practice-scheduler:$COMMIT_SHA
      - .

  # 2. Push image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/$PROJECT_ID/qybsl-practice-scheduler:$COMMIT_SHA

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - qybsl-practice-scheduler
      - --image=gcr.io/$PROJECT_ID/qybsl-practice-scheduler:$COMMIT_SHA
      - --region=us-east1
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=FIRESTORE_PROJECT_ID=$PROJECT_ID,FIRESTORE_DATABASE_ID=practice

images:
  - gcr.io/$PROJECT_ID/qybsl-practice-scheduler:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
